include:
  - path: apps/backend/docker-compose.yml
    env_file: .env

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    profiles: [app]
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-proy2}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-retrosound}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
      NODE_ENV: development
    volumes:
      - ./apps/backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retrosound-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    profiles: [app]
    ports:
      - "3002:3002"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      NODE_ENV: development
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - retrosound-network

networks:
  retrosound-network:
    name: retrosound-network
    driver: bridge
