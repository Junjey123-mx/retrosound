include:
  - path: apps/backend/docker-compose.yml
    env_file: .env

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    profiles: [app]
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      NODE_ENV: development
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retrosound-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    profiles: [app]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: development
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - retrosound-network

networks:
  retrosound-network:
    name: retrosound-network
    driver: bridge
